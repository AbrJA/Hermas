<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>
    <div class="app-shell">
      <aside id="historyRail" class="history-rail">
        <div class="rail-header">
          <div class="brand">
            <div class="brand-dot"></div>
            <h1>Hermas</h1>
          </div>
          <button id="historyToggle" class="secondary-btn rail-toggle" type="button" aria-expanded="true" aria-controls="historyRail">Hide</button>
          <p class="subtitle">Your recent conversations</p>
        </div>

        <section class="history-panel">
          <div class="history-actions">
            <button id="newChatButton" class="secondary-btn" type="button">New chat</button>
            <button id="historyRefreshButton" class="secondary-btn" type="button">Refresh</button>
          </div>
          <label for="historySearch">Search chats</label>
          <input id="historySearch" placeholder="Type to filter history..." />
          <div id="historyList" class="history-list"></div>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="chat-title-wrap">
            <h2>Conversation</h2>
            <p id="statusLine">Ready</p>
          </div>

          <div class="chat-header-actions">
            <div class="status-chips">
              <span id="modelSummary" class="chip">Model: -</span>
              <span id="skillsSummary" class="chip">Skills: 0</span>
              <span id="mcpSummary" class="chip">MCP: none</span>
            </div>
            <button id="modelToggle" class="secondary-btn settings-btn" type="button" aria-expanded="false" aria-controls="modelPanel">Model</button>
            <button id="skillsToggle" class="secondary-btn settings-btn" type="button" aria-expanded="false" aria-controls="skillsPanel">Skills</button>
            <button id="mcpToggle" class="secondary-btn settings-btn" type="button" aria-expanded="false" aria-controls="mcpPanel">MCP</button>
            <button id="accessToggle" class="secondary-btn settings-btn" type="button" aria-expanded="false" aria-controls="accessPanel">Access</button>
          </div>
        </header>

        <section class="control-popovers" aria-label="Selection controls">
          <article id="modelPanel" class="selector-panel" hidden>
            <label for="modelSelect">Choose model</label>
            <select id="modelSelect"></select>
          </article>

          <article id="skillsPanel" class="selector-panel" hidden>
            <div class="skill-routing-control">
              <label class="checkbox-row" for="autoSkillRouting">
                <input id="autoSkillRouting" type="checkbox" checked />
                <span>Let the model choose the most relevant skill</span>
              </label>
              <p class="hint">Turn this off to use checked skills exactly as selected.</p>
            </div>
            <div id="skillsContainer" class="skills-list"></div>
            <div class="skill-upload-section">
              <label for="skillUpload">Upload a skill (.md)</label>
              <div class="upload-row">
                <input id="skillUpload" type="file" accept=".md" />
                <button id="uploadSkillButton" class="secondary-btn" type="button">Upload</button>
              </div>
            </div>
          </article>

          <article id="mcpPanel" class="selector-panel" hidden>
            <label for="mcpSelect">Choose MCP server</label>
            <select id="mcpSelect"></select>
            <div class="selector-actions">
              <button id="refreshMcpButton" class="secondary-btn" type="button">Refresh list</button>
              <button id="loadToolsButton" class="secondary-btn" type="button">Load tools</button>
            </div>
            <div id="mcpToolsOutput" class="tools-output" aria-live="polite"></div>
            <div class="mcp-form-toggle">
              <button id="mcpFormToggle" class="secondary-btn" type="button">Add / Edit server</button>
            </div>
            <div id="mcpFormSection" class="mcp-form-section">
              <div class="mcp-form">
                <input id="mcpFormId" type="hidden" />
                <label for="mcpFormName">Name</label>
                <input id="mcpFormName" placeholder="my-server" />
                <label for="mcpFormUrl">URL</label>
                <input id="mcpFormUrl" placeholder="http://localhost:8000/mcp" />
                <label for="mcpFormAuthName">Auth header name</label>
                <input id="mcpFormAuthName" placeholder="Authorization" />
                <label for="mcpFormAuthValue">Auth header value</label>
                <input id="mcpFormAuthValue" type="password" placeholder="Bearer secret" />
                <div class="mcp-form-actions">
                  <button id="saveMcpButton" class="secondary-btn" type="button">Save</button>
                  <button id="deleteMcpButton" class="secondary-btn danger-btn" type="button">Delete</button>
                  <button id="cancelMcpButton" class="secondary-btn" type="button">Cancel</button>
                </div>
              </div>
            </div>
          </article>

          <article id="accessPanel" class="selector-panel" hidden>
            <label for="apiKey">API key override (optional)</label>
            <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

            <label for="appToken">App token (when auth is enabled)</label>
            <input id="appToken" type="password" placeholder="Configured by admin" autocomplete="off" />
            <p class="hint">Leave both empty to use backend defaults.</p>
          </article>
        </section>

        <div id="settingsBackdrop" class="settings-backdrop"></div>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="chatForm" class="composer">
          <div class="composer-inner">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Message Hermas..."
              required
            ></textarea>
            <button id="sendButton" type="submit" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
            </button>
          </div>
          <span class="composer-hint">Enter to send · Shift+Enter for new line</span>
        </form>
      </main>
    </div>

    <template id="messageTemplate">
      <article class="message-row">
        <div class="role-pill"></div>
        <div class="message-content"></div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
