services:
  app:
    build: .
    container_name: hermas-app
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: hermas-nginx
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
